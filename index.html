<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間割確認サイト</title>
  <style>
    body { font-family: sans-serif; background-color: #f5f7fa; padding: 20px; color: #333; }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
    /* 💡 最終更新時刻のスタイル */
    .update-time { text-align: center; font-size: 13px; color: #7f8c8d; margin-bottom: 20px; }
    .selector-container { text-align: center; margin-bottom: 20px; }
    select { padding: 10px 20px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
    .timetable-grid { display: block; max-width: 500px; margin: 0 auto; }
    .day-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .day-title { font-size: 18px; font-weight: bold; border-left: 5px solid #3498db; padding-left: 10px; margin-bottom: 10px; color: #2c3e50; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    th { width: 25%; color: #7f8c8d; }
    td { font-weight: bold; color: #34495e; }
    .last-update{color:#7f8c8d;} 
  </style>
</head>
<body>

  <h1>📅時間割</h1>
  <div class="selector-container">
    <label for="class-select">クラスを選択：</label>
    <select id="class-select" onchange="updateView(); updateURL();">
      <option value="1-1">1年1組</option>
      <option value="1-2">1年2組</option>
      <option value="2-1">2年1組</option>
      <option value="2-2">2年2組</option>
      <option value="3-1">3年1組</option>
      <option value="3-2">3年2組</option>
    </select>
  </div>

  <div id="timetable-display" class="timetable-grid">
    <p style="text-align:center;">データを読み込んでいます...</p>
  </div>

  <script>
    let rawTimetableData = {};

    // 1. ページが開かれたら、まずURLをチェックしてクラスを設定し、その後データを読み込む
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      let defaultClass = urlParams.get('class');

      if (!defaultClass) {
        defaultClass = "1-1";
      }

      const classSelectElement = document.getElementById("class-select");
      if (classSelectElement) {
        classSelectElement.value = defaultClass;
      }

      // GitHub Pagesに置かれた timetable.json を取得する
      fetch('./timetable.json')
        .then(response => {
          if (!response.ok) throw new Error('データの取得に失敗しました');
          return response.json();
        })
        .then(data => {
          rawTimetableData = data; // データを保存
          
          // 💡 データを正常に取得できた時刻を「最終更新時刻」として表示
          setLastUpdateTime();
          
          updateView(); // 画面を表示
        })
        .catch(error => {
          document.getElementById('timetable-display').innerHTML = `<p style="color:red; text-align:center;">${error.message}</p>`;
          document.getElementById('last-update').innerText = "データの読み込みに失敗しました";
        });
    };

    // 2. 選択されたクラスに基づいて、3日分の時間割画面を組み立てる関数
    function updateView() {
      const selectedClass = document.getElementById('class-select').value;
      const displayArea = document.getElementById('timetable-display');
      
      if (!rawTimetableData || Object.keys(rawTimetableData).length === 0) return;

      let htmlContent = '';

      // JSONの中にある日付（3日分）をループ処理
      for (const date in rawTimetableData) {
        const classData = rawTimetableData[date][selectedClass];
        
        if (!classData) continue;

        // 日付ごとにカード（枠）を作成
        htmlContent += `
          <div class="day-card">
            <div class="day-title">${formatDate(date)}</div>
            <table>
              <tr><th>1限</th><td>${classData[1] || 'なし'}</td></tr>
              <tr><th>2限</th><td>${classData[2] || 'なし'}</td></tr>
              <tr><th>3限</th><td>${classData[3] || 'なし'}</td></tr>
              <tr><th>4限</th><td>${classData[4] || 'なし'}</td></tr>
              <tr><th>5限</th><td>${classData[5] || 'なし'}</td></tr>
              <tr><th>6限</th><td>${classData[6] || 'なし'}</td></tr>
            </table>
          </div>
        `;
      }

      if (htmlContent === '') {
        htmlContent = '<p style="text-align:center;">指定されたクラスの時間割データがありません。</p>';
      }

      displayArea.innerHTML = htmlContent;
    }

    // プルダウンを変えたときにURLの後ろの文字（?class=xxx）を自動で書き換える関数
    function updateURL() {
      const selectedClass = document.getElementById('class-select').value;
      const newUrl = `${window.location.pathname}?class=${selectedClass}`;
      window.history.pushState({ path: newUrl }, '', newUrl);
    }

    // 💡【修正】日付の見栄えを良くし、曜日も追加する補助関数 (例: 2026-05-20 -> 5月20日(水))
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const dayOfWeekList = ["日", "月", "火", "水", "木", "金", "土"];
      const month = d.getMonth() + 1;
      const date = d.getDate();
      const dayOfWeek = dayOfWeekList[d.getDay()]; // 曜日を取得
      
      return `${month}月${date}日 (${dayOfWeek})`;
    }

    // 💡【新設】現在の時刻を取得して「最終更新時刻」にセットする関数
    
  </script>
</body>
</html>
